<div class="actions">
  <button
    mat-raised-button
    color="primary"
    routerLink="/courses/add">
    <mat-icon>add</mat-icon>
    Add New Course
  </button>
</div>

<div class="container">
  @for (course of courses; track course.id) {
    <app-course-card
      [course]="course"
      (edit)="onEditCourse($event)"
      (delete)="onDeleteCourse($event)">
    </app-course-card>
  }
</div>
